# CI 工作流 - 构建和测试
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/DataForgeStudio.sln

      - name: Build
        run: dotnet build backend/DataForgeStudio.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/DataForgeStudio.sln --configuration Release --no-build --verbosity normal

  build-frontend:
    name: Build Frontend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run lint
        working-directory: frontend
        run: npm run lint || true
