<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background (superellipse style) -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Bar chart icon - represents data reports -->
  <!-- Left bar (shortest) -->
  <rect x="96" y="288" width="64" height="128" rx="12" fill="white"/>
  <!-- Middle bar (medium) -->
  <rect x="224" y="192" width="64" height="224" rx="12" fill="white"/>
  <!-- Right bar (tallest) -->
  <rect x="352" y="96" width="64" height="320" rx="12" fill="white"/>
</svg>
